<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>活動紹介 | Sugger Rabbits</title>

<style>
    body {
        margin: 0;
        font-family: "Helvetica", "Arial", sans-serif;
        background: #fffafc;
        color: #333;
    }

    /* ヘッダー */
    header {
        position: fixed;
        top: 0;
        width: 100%;
        height: 60px;
        background: #ff7ac2;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 15px;
        z-index: 1000;
        color: white;
    }
    header img.logo {
        height: 40px;
        border-radius: 5px;
    }
    header .team-name {
        font-size: 18px;
        font-weight: bold;
        margin-left: 10px;
    }

    /* ハンバーガーメニュー */
    .menu-btn {
        font-size: 28px;
        cursor: pointer;
    }
    nav {
        position: fixed;
        top: 60px;
        right: -200px;
        width: 200px;
        height: 100%;
        background: #ffe0f0;
        transition: 0.3s;
        padding-top: 20px;
        z-index: 999;
    }
    nav a {
        display: block;
        padding: 15px;
        color: #333;
        text-decoration: none;
        border-bottom: 1px solid #ffc4e0;
    }
    nav.open {
        right: 0;
    }

    /* セクション */
    section {
        padding: 20px;
        margin-top: 60px;
    }
    h2 {
        font-size: 20px;
        border-left: 5px solid #ff7ac2;
        padding-left: 10px;
        margin-bottom: 10px;
    }
    h3 {
        font-size: 18px;
        margin-top: 20px;
    }
    .photo {
        width: 100%;
        border-radius: 10px;
        margin: 10px 0;
    }

    /* カレンダー風ボックス */
    .calendar-box {
        background: #fff;
        border: 2px solid #ffb6d9;
        border-radius: 10px;
        padding: 15px;
        margin: 10px 0;
    }

    /* フッタ */
    footer {
        background: #ff7ac2;
        color: white;
        padding: 20px;
        text-align: center;
        margin-top: 40px;
    }
</style>

<script>
function toggleMenu() {
    document.getElementById("nav").classList.toggle("open");
}
</script>

</head>
