<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お問い合わせ | Sugger Rabbits</title>

<style>
    body {
        margin: 0;
        font-family: "Helvetica", "Arial", sans-serif;
        background: #fffafc;
        color: #333;
    }

    /* ヘッダー */
    header {
        position: fixed;
        top: 0;
        width: 100%;
        height: 60px;
        background: #ff7ac2;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 15px;
        z-index: 1000;
        color: white;
    }
    header img.logo {
        height: 40px;
        border-radius: 5px;
    }
    header .team-name {
        font-size: 18px;
        font-weight: bold;
        margin-left: 10px;
    }

    /* ハンバーガーメニュー */
    .menu-btn {
        font-size: 28px;
        cursor: pointer;
    }
    nav {
        position: fixed;
        top: 60px;
        right: -200px;
        width: 200px;
        height: 100%;
        background: #ffe0f0;
        transition: 0.3s;
        padding-top: 20px;
        z-index: 999;
    }
    nav a {
        display: block;
        padding: 15px;
        color: #333;
        text-decoration: none;
        border-bottom: 1px solid #ffc4e0;
    }
    nav.open {
        right: 0;
    }

    /* セクション */
    section {
        padding: 20px;
        margin-top: 60px;
    }
    h2 {
        font-size: 20px;
        border-left: 5px solid #ff7ac2;
        padding-left: 10px;
        margin-bottom: 10px;
    }

    /* フォーム */
    form {
        margin-top: 20px;
    }
    label {
        font-weight: bold;
        display: block;
        margin-top: 15px;
    }
    .required {
        color: red;
        font-weight: bold;
    }
    input, select, textarea {
        width: 100%;
        padding: 12px;
        margin-top: 5px;
        border: 1px solid #ffb6d9;
        border-radius: 8px;
        font-size: 16px;
        background: #fff;
    }
    textarea {
        height: 120px;
    }

    /* 送信ボタン */
    .submit-btn {
        width: 100%;
        background: #ff7ac2;
        color: white;
        padding: 15px;
        border: none;
        border-radius: 30px;
        font-size: 18px;
        margin-top: 25px;
        cursor: pointer;
    }

    /* フッタ */
    footer {
        background: #ff7ac2;
        color: white;
        padding: 20px;
        text-align: center;
        margin-top: 40px;
    }
</style>

<script>
function toggleMenu() {
    document.getElementById("nav").classList.toggle("open");
}
</script>

</head>
<body>

<header>
    <div style="display:flex; align-items:center;">
        <img src="https://source.unsplash.com/100x100/?rabbit,logo" class="logo">
        <span class="team-name">Sugger Rabbits</span>
    </div>
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
</header>

<nav id="nav">
    <a href="home.html">ホーム</a>
    <a href="about.html">概要</a>
    <a href="activity.html">活動紹介</a>
    <a href="staff.html">スタッフ紹介</a>
    <a href="contact.html">問い合わせ</a>
    <a href="https://instagram.com" target="_blank">Instagram</a>
</nav>

<section>
    <h2>お問い合わせ</h2>
    <p>体験・見学・入会希望など、お気軽にお問い合わせください。</p>

    <form>

        <label>お問い合わせカテゴリ <span class="required">＊</span></label>
        <select required>
            <option value="">選択してください</option>
            <option>入会希望</option>
            <option>体験・見学希望</option>
            <option>その他</option>
        </select>

        <label>子供名前 <span class="required">＊</span></label>
        <input type="text" required>

        <label>子供フリガナ <span class="required">＊</span></label>
        <input type="text" required>

        <label>メールアドレス <span class="required">＊</span></label>
        <input type="email" required>

        <label>メールアドレス確認 <span class="required">＊</span></label>
        <input type="email" required>

        <label>電話番号</label>
        <input type="tel">

        <label>お問い合わせ内容 <span class="required">＊</span></label>
        <textarea required></textarea>

        <label>
            <input type="checkbox" required>
            個人情報取り扱いに同意する <span class="required">＊</span>
        </label>
        <p style="font-size:14px; color:#555;">
            ※ 個人情報はお問い合わせ対応のみに使用し、第三者に提供することはありません。
        </p>

        <button type="submit" class="submit-btn">送信する</button>
    </form>
</section>

<footer>
    <div style="margin-bottom:10px; font-weight:bold;">Sugger Rabbits</div>
    <a href="home.html" style="color:white; text-decoration:none; margin:0 5px;">ホーム</a> |
    <a href="about.html" style="color:white; text-decoration:none; margin:0 5px;">概要</a> |
    <a href="activity.html" style="color:white; text-decoration:none; margin:0 5px;">活動紹介</a> |
    <a href="staff.html" style="color:white; text-decoration:none; margin:0 5px;">スタッフ紹介</a> |
    <a href="contact.html" style="color:white; text-decoration:none; margin:0 5px;">問い合わせ</a> |
    <a href="https://instagram.com" target="_blank" style="color:white; text-decoration:none; margin:0 5px;">Instagram</a>
</footer>


</body>
</html>
